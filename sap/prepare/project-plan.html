<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目总体计划 WBS | 佛山照明 SAP S/4HANA 升级项目</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei",Arial,sans-serif;background:#EBF4FF;color:#0D1B2A}
.topbar{background:linear-gradient(90deg,#1B3A6B,#005EB8);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.topbar .left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar .title{font-size:14px;font-weight:700}
.badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);padding:3px 10px;border-radius:12px;font-size:11px}
.topbar a.back{color:rgba(255,255,255,.85);text-decoration:none;font-size:12px;padding:4px 10px;border:1px solid rgba(255,255,255,.3);border-radius:6px}
.topbar a.back:hover{background:rgba(255,255,255,.15)}
.content{max-width:1200px;margin:0 auto;padding:24px 20px 60px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.toolbar a.dl{background:#005EB8;color:#fff;text-decoration:none;padding:7px 16px;border-radius:6px;font-size:12px}
.toolbar a.dl:hover{background:#003087}
.meta-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.mc{background:#fff;border-radius:8px;padding:14px 18px;border:1px solid #D0E4F7;border-top:3px solid #005EB8}
.mc .mc-val{font-size:20px;font-weight:700;color:#1B3A6B}
.mc .mc-lbl{font-size:11px;color:#6B8CB8;margin-top:3px}
.section-title{font-size:15px;font-weight:700;color:#1B3A6B;border-left:4px solid #005EB8;padding-left:10px;margin:24px 0 14px}
/* Gantt */
.gantt-wrap{background:#fff;border-radius:10px;padding:20px;border:1px solid #D0E4F7;overflow-x:auto;margin-bottom:24px}
.gantt-inner{min-width:900px}
.gantt-header{display:grid;gap:0;margin-bottom:4px}
.gantt-month-row{display:flex;border-bottom:2px solid #D0E4F7;padding-bottom:4px;margin-bottom:4px}
.gantt-month{font-size:10px;font-weight:700;color:#6B8CB8;text-align:center;border-right:1px solid #EBF4FF;padding:2px 4px;white-space:nowrap}
.gantt-row{display:flex;align-items:center;gap:0;border-bottom:1px solid #EBF4FF;min-height:30px}
.gantt-row:hover{background:#F8FBFF}
.gantt-label-col{width:220px;flex-shrink:0;padding:4px 8px;font-size:12px;border-right:1px solid #D0E4F7;display:flex;align-items:center;gap:6px}
.gantt-label-col.parent{font-weight:700;color:#1B3A6B;background:#F0F7FF}
.gantt-label-col.child{padding-left:24px;color:#2C3E50}
.wbs-id{font-size:10px;color:#6B8CB8;min-width:28px}
.gantt-timeline{flex:1;position:relative;height:30px;display:flex;align-items:center}
.gantt-cell{height:100%;border-right:1px solid #EBF4FF;flex-shrink:0}
.gantt-bar{position:absolute;height:16px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;top:7px}
.bar-prepare{background:#1B3A6B}
.bar-explore{background:#005EB8}
.bar-realize{background:#1F70C1}
.bar-deploy{background:#4A6FA5}
/* WBS Table */
.wbs-table{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #D0E4F7}
.wbs-table th{background:#1B3A6B;color:#fff;padding:9px 12px;text-align:left;font-weight:600}
.wbs-table td{padding:8px 12px;border-bottom:1px solid #EBF4FF;vertical-align:middle}
.wbs-table tr:nth-child(even) td{background:#F8FBFF}
.wbs-table tr.parent-row td{background:#EBF4FF;font-weight:700;color:#1B3A6B}
.wbs-table tr:hover td{background:#E0EEFF}
.status-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:#D0E4F7;color:#1B3A6B}
.phase-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;color:#fff}
.tag-prepare{background:#1B3A6B}
.tag-explore{background:#005EB8}
.tag-realize{background:#1F70C1}
.tag-deploy{background:#4A6FA5}
/* progress chart */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:#fff;border-radius:10px;padding:18px;border:1px solid #D0E4F7}
.chart-card h4{font-size:13px;font-weight:700;color:#1B3A6B;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #EBF4FF}
.chart-wrap{height:200px;position:relative}
@media(max-width:768px){
  .chart-grid{grid-template-columns:1fr}
  .meta-cards{grid-template-columns:repeat(2,1fr)}
  .gantt-label-col{width:160px;font-size:11px}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="left">
    <span class="title">📅 项目总体计划（WBS）</span>
    <span class="badge">SAP 准备阶段</span>
    <span class="badge">v0.1</span>
    <span class="badge">2026-06-10</span>
  </div>
  <a class="back" href="../">← 返回准备阶段</a>
</div>

<div class="content">
  <div class="toolbar">
    <a class="dl" href="project-plan.xlsx" download="佛照_项目总体计划_WBS_v0.1.xlsx">⬇ 下载 Excel 原件</a>
    <span style="font-size:12px;color:#6B8CB8">佛山照明 SAP S/4HANA 升级项目总体计划 · 艾维登（Eviden）· v0.1</span>
  </div>

  <div class="meta-cards">
    <div class="mc"><div class="mc-val">4</div><div class="mc-lbl">实施阶段</div></div>
    <div class="mc"><div class="mc-val">17</div><div class="mc-lbl">WBS任务项</div></div>
    <div class="mc"><div class="mc-val">200天</div><div class="mc-lbl">总工期（约）</div></div>
    <div class="mc"><div class="mc-val">2026-06-15</div><div class="mc-lbl">项目启动</div></div>
    <div class="mc"><div class="mc-val">2027-01-01</div><div class="mc-lbl">目标上线</div></div>
    <div class="mc"><div class="mc-val">0%</div><div class="mc-lbl">整体完成度</div></div>
  </div>

  <!-- Gantt Chart -->
  <div class="section-title">📊 甘特图总览</div>
  <div class="gantt-wrap">
    <div class="gantt-inner" id="ganttContainer">
      <!-- JS rendered -->
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-grid">
    <div class="chart-card">
      <h4>各阶段工期分布（天）</h4>
      <div class="chart-wrap"><canvas id="durationChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h4>各阶段时间区间（甘特缩略图）</h4>
      <div class="chart-wrap"><canvas id="phaseChart"></canvas></div>
    </div>
  </div>

  <!-- WBS Table -->
  <div class="section-title">📋 WBS 任务清单</div>
  <table class="wbs-table" id="wbsTable">
    <thead>
      <tr>
        <th>WBS编号</th><th>任务名称</th><th>阶段</th>
        <th>开始日期</th><th>结束日期</th><th>工期</th>
        <th>责任人</th><th>状态</th><th>完成度</th><th>前置任务</th>
      </tr>
    </thead>
    <tbody id="wbsBody"></tbody>
  </table>
</div>

<script>
var WBS = [
  {id:'1',   name:'准备阶段（Prepare）',  phase:'准备', start:'2026-06-15',end:'2026-08-09',days:55, owner:'项目经理',    status:'未开始',pct:0, pre:'',    parent:true},
  {id:'1.1', name:'项目启动会',           phase:'准备', start:'2026-06-15',end:'2026-06-15',days:1,  owner:'项目经理',    status:'未开始',pct:0, pre:'',    parent:false},
  {id:'1.2', name:'Readiness Check',     phase:'准备', start:'2026-06-16',end:'2026-07-15',days:30, owner:'技术负责人',  status:'未开始',pct:0, pre:'1.1', parent:false},
  {id:'1.3', name:'定制代码扫描',         phase:'准备', start:'2026-07-01',end:'2026-07-31',days:31, owner:'开发负责人',  status:'未开始',pct:0, pre:'1.1', parent:false},
  {id:'1.4', name:'接口台账建立',         phase:'准备', start:'2026-07-01',end:'2026-08-09',days:40, owner:'集成负责人',  status:'未开始',pct:0, pre:'1.1', parent:false},
  {id:'2',   name:'探索阶段（Explore）',  phase:'探索', start:'2026-08-10',end:'2026-09-21',days:42, owner:'应用架构师',  status:'未开始',pct:0, pre:'1',   parent:true},
  {id:'2.1', name:'Fit-to-Standard研讨', phase:'探索', start:'2026-08-10',end:'2026-09-06',days:28, owner:'应用架构师',  status:'未开始',pct:0, pre:'2',   parent:false},
  {id:'2.2', name:'方案蓝图签署',         phase:'探索', start:'2026-09-07',end:'2026-09-21',days:14, owner:'PM',         status:'未开始',pct:0, pre:'2.1', parent:false},
  {id:'3',   name:'实现阶段（Realize）',  phase:'实现', start:'2026-09-22',end:'2026-12-05',days:75, owner:'开发负责人',  status:'未开始',pct:0, pre:'2',   parent:true},
  {id:'3.1', name:'Sprint 1 配置与开发', phase:'实现', start:'2026-09-22',end:'2026-10-19',days:28, owner:'开发负责人',  status:'未开始',pct:0, pre:'3',   parent:false},
  {id:'3.2', name:'Sprint 2 配置与开发', phase:'实现', start:'2026-10-20',end:'2026-11-16',days:28, owner:'开发负责人',  status:'未开始',pct:0, pre:'3.1', parent:false},
  {id:'3.3', name:'Sprint 3 硬化',       phase:'实现', start:'2026-11-17',end:'2026-12-05',days:19, owner:'开发负责人',  status:'未开始',pct:0, pre:'3.2', parent:false},
  {id:'4',   name:'部署阶段（Deploy）',   phase:'部署', start:'2026-12-06',end:'2027-01-01',days:26, owner:'PM',         status:'未开始',pct:0, pre:'3',   parent:true},
  {id:'4.1', name:'UAT测试',             phase:'部署', start:'2026-12-06',end:'2026-12-16',days:11, owner:'测试经理',    status:'未开始',pct:0, pre:'4',   parent:false},
  {id:'4.2', name:'切换演练DR1/DR2',     phase:'部署', start:'2026-12-12',end:'2026-12-20',days:9,  owner:'技术负责人',  status:'未开始',pct:0, pre:'4.1', parent:false},
  {id:'4.3', name:'终端用户培训',         phase:'部署', start:'2026-12-06',end:'2026-12-24',days:19, owner:'OCM专员',    status:'未开始',pct:0, pre:'4',   parent:false},
  {id:'4.4', name:'正式切换上线',         phase:'部署', start:'2026-12-31',end:'2027-01-01',days:1,  owner:'项目经理',   status:'未开始',pct:0, pre:'4.2', parent:false}
];

var COLORS = {准备:'#1B3A6B', 探索:'#005EB8', 实现:'#1F70C1', 部署:'#4A6FA5'};
var PROJECT_START = new Date('2026-06-15');
var PROJECT_END   = new Date('2027-01-01');
var TOTAL_DAYS = (PROJECT_END - PROJECT_START) / 86400000 + 1;

// ── Build Gantt ──
var months = [];
var d = new Date(PROJECT_START);
while (d <= PROJECT_END) {
  var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  if (!months.length || months[months.length-1].key !== key)
    months.push({key:key, label:(d.getMonth()+1)+'月', year:d.getFullYear(), days:0, start:new Date(d)});
  months[months.length-1].days++;
  d.setDate(d.getDate()+1);
}

var gc = document.getElementById('ganttContainer');
// Month header
var mHeader = '<div style="display:flex;border-bottom:2px solid #D0E4F7;margin-bottom:2px;">';
mHeader += '<div style="width:220px;flex-shrink:0;border-right:1px solid #D0E4F7;padding:4px 8px;font-size:11px;font-weight:700;color:#6B8CB8">任务 / 月份</div>';
mHeader += '<div style="flex:1;display:flex;">';
months.forEach(function(m) {
  var pct = (m.days/TOTAL_DAYS*100).toFixed(2);
  mHeader += '<div style="width:'+pct+'%;min-width:1px;border-right:1px solid #EBF4FF;padding:3px 4px;font-size:10px;font-weight:700;color:#6B8CB8;text-align:center;white-space:nowrap;overflow:hidden">'+
    (m.year===2026?'':m.year+'年')+m.label+'</div>';
});
mHeader += '</div></div>';
gc.innerHTML = mHeader;

// Rows
WBS.forEach(function(task) {
  var startD = new Date(task.start);
  var endD   = new Date(task.end);
  var offsetPct = ((startD - PROJECT_START) / 86400000 / TOTAL_DAYS * 100).toFixed(2);
  var widthPct  = ((endD - startD) / 86400000 + 1) / TOTAL_DAYS * 100;
  if (widthPct < 0.3) widthPct = 0.3;
  widthPct = widthPct.toFixed(2);

  var rowBg = task.parent ? 'background:#F0F7FF;' : '';
  var labelStyle = task.parent
    ? 'font-weight:700;color:#1B3A6B;padding:5px 8px;'
    : 'padding-left:24px;padding-top:5px;padding-bottom:5px;padding-right:8px;color:#2C3E50;font-size:11.5px;';

  var row = '<div style="display:flex;align-items:center;border-bottom:1px solid #EBF4FF;min-height:28px;'+rowBg+'">';
  row += '<div style="width:220px;flex-shrink:0;border-right:1px solid #D0E4F7;'+labelStyle+'display:flex;align-items:center;gap:4px;">';
  row += '<span style="font-size:10px;color:#6B8CB8;min-width:22px">'+task.id+'</span>';
  row += '<span>'+task.name+'</span></div>';
  row += '<div style="flex:1;position:relative;height:28px;">';
  // month grid lines
  var acc = 0;
  months.forEach(function(m) {
    var pct = (m.days/TOTAL_DAYS*100).toFixed(2);
    acc += parseFloat(pct);
    row += '<div style="position:absolute;left:'+acc+'%;top:0;bottom:0;width:1px;background:#EBF4FF;"></div>';
  });
  // bar
  row += '<div style="position:absolute;left:'+offsetPct+'%;width:'+widthPct+'%;height:16px;top:6px;border-radius:4px;background:'+COLORS[task.phase]+';display:flex;align-items:center;padding:0 5px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;" title="'+task.name+' ('+task.start+' ~ '+task.end+')">'+
    (parseFloat(widthPct) > 3 ? task.name : '')+'</div>';
  row += '</div></div>';
  gc.innerHTML += row;
});

// ── WBS Table ──
var tbody = document.getElementById('wbsBody');
WBS.forEach(function(task) {
  var tr = document.createElement('tr');
  if (task.parent) tr.className = 'parent-row';
  var tagClass = 'tag-'+{准备:'prepare',探索:'explore',实现:'realize',部署:'deploy'}[task.phase];
  tr.innerHTML =
    '<td>'+task.id+'</td>'+
    '<td style="'+(task.parent?'':'padding-left:20px')+'">'+task.name+'</td>'+
    '<td><span class="phase-tag '+tagClass+'">'+task.phase+'</span></td>'+
    '<td>'+task.start+'</td>'+
    '<td>'+task.end+'</td>'+
    '<td>'+task.days+'天</td>'+
    '<td>'+task.owner+'</td>'+
    '<td><span class="status-badge">'+task.status+'</span></td>'+
    '<td>'+task.pct+'%</td>'+
    '<td>'+task.pre+'</td>';
  tbody.appendChild(tr);
});

// ── Duration Chart ──
var durCtx = document.getElementById('durationChart');
new Chart(durCtx, {
  type: 'bar',
  data: {
    labels: ['准备阶段', '探索阶段', '实现阶段', '部署阶段'],
    datasets: [{
      label: '工期（天）',
      data: [55, 42, 75, 26],
      backgroundColor: Object.values(COLORS),
      borderRadius: 6
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    layout: {padding:{top:20}},
    plugins: {
      legend: {display:false},
      datalabels: {display:false}
    },
    scales: {y:{beginAtZero:true, title:{display:true,text:'天数'}}}
  }
});

// ── Phase Timeline Chart ──
var phaseCtx = document.getElementById('phaseChart');
var phases = [
  {label:'准备阶段', start:'2026-06-15', end:'2026-08-09', color:COLORS['准备']},
  {label:'探索阶段', start:'2026-08-10', end:'2026-09-21', color:COLORS['探索']},
  {label:'实现阶段', start:'2026-09-22', end:'2026-12-05', color:COLORS['实现']},
  {label:'部署阶段', start:'2026-12-06', end:'2027-01-01', color:COLORS['部署']}
];
var datasets = phases.map(function(p, i) {
  var s = (new Date(p.start) - PROJECT_START) / 86400000;
  var dur = (new Date(p.end) - new Date(p.start)) / 86400000 + 1;
  var base = Array(4).fill(null);
  var bar  = Array(4).fill(null);
  base[i] = s;
  bar[i]  = dur;
  return [
    {data: base, backgroundColor:'transparent', stack:'s'},
    {data: bar,  backgroundColor: p.color, borderRadius:4, stack:'s', label:p.label}
  ];
}).flat();
new Chart(phaseCtx, {
  type: 'bar',
  data: { labels: ['准备','探索','实现','部署'], datasets: datasets },
  options: {
    indexAxis: 'y',
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: {display:false},
      datalabels: {display:false},
      tooltip: {
        callbacks: {
          label: function(c) {
            if (!c.raw || c.datasetIndex % 2 === 0) return null;
            var p = phases[Math.floor(c.datasetIndex/2)];
            return p.start + ' → ' + p.end + '（' + c.raw + '天）';
          }
        },
        filter: function(c){ return c.datasetIndex % 2 !== 0; }
      }
    },
    scales: {
      x: {stacked:true, title:{display:true,text:'距项目启动天数（2026-06-15起）'}},
      y: {stacked:true}
    }
  }
});
</script>
</body>
</html>
