<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAP 实施交付物清单 | FSL工作台</title>
<style>
:root{--b900:#0B2D47;--b700:#1A4F73;--b500:#2374A3;--b300:#5EA4CE;
      --b100:#C7E2F2;--b050:#EBF5FB;--bg:#F2F7FB;--text:#0F2233;
      --muted:#5B7A91;--rule:#D6E8F2;--r:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;
     background:var(--bg);color:var(--text);font-size:14px;line-height:1.75;}
a{color:var(--b500);text-decoration:none;}
a:hover{color:var(--b700);}

nav{background:var(--b900);padding:0 32px;display:flex;align-items:center;
    height:52px;position:sticky;top:0;z-index:100;
    box-shadow:0 2px 8px rgba(11,45,71,.4);}
.nav-logo{color:#fff;font-size:15px;font-weight:800;letter-spacing:.3px;}
.nav-sub{color:rgba(255,255,255,.5);font-size:12px;margin-left:16px;}

.hero{background:linear-gradient(155deg,var(--b900) 0%,var(--b700) 100%);
      color:#fff;padding:52px 48px 44px;border-bottom:3px solid var(--b500);}
.hero h1{font-size:26px;font-weight:800;margin-bottom:8px;letter-spacing:-.2px;}
.hero p{font-size:13.5px;opacity:.78;max-width:720px;line-height:1.8;}
.hero-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
      border-radius:3px;padding:3px 12px;font-size:11px;letter-spacing:.4px;text-transform:uppercase;}

.container{max-width:1280px;margin:0 auto;padding:36px 32px;}

/* breadcrumb */
.bc{display:flex;align-items:center;gap:6px;font-size:12.5px;
    color:var(--muted);margin-bottom:28px;flex-wrap:wrap;}
.bc a{color:var(--b500);}
.bc span{color:var(--muted);}

/* category header */
.cat-header{display:flex;align-items:center;gap:12px;margin:32px 0 16px;}
.cat-icon{width:36px;height:36px;background:var(--b700);border-radius:var(--r);
          display:flex;align-items:center;justify-content:center;
          font-size:18px;flex-shrink:0;}
.cat-title{font-size:17px;font-weight:800;color:var(--b900);}
.cat-desc{font-size:12.5px;color:var(--muted);margin-top:2px;}

/* directory grid */
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
          gap:14px;margin-bottom:32px;}

/* card */
.doc-card{background:#fff;border:1px solid var(--rule);border-radius:var(--r);
          padding:20px 22px;display:flex;flex-direction:column;gap:8px;
          box-shadow:0 1px 4px rgba(35,116,163,.06);
          transition:box-shadow .18s,transform .18s;cursor:pointer;}
.doc-card:hover{box-shadow:0 4px 16px rgba(35,116,163,.14);transform:translateY(-2px);}
.doc-card .dc-type{font-size:10.5px;font-weight:800;letter-spacing:.5px;
                   text-transform:uppercase;color:var(--b500);}
.doc-card .dc-title{font-size:13.5px;font-weight:700;color:var(--b900);line-height:1.4;}
.doc-card .dc-desc{font-size:12px;color:var(--muted);line-height:1.55;}
.doc-card .dc-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.dc-tag{background:var(--b050);color:var(--b700);font-size:11px;font-weight:600;
        padding:2px 8px;border-radius:3px;}
.doc-card .dc-arrow{margin-top:auto;color:var(--b500);font-size:13px;font-weight:700;}

/* folder card */
.folder-card{background:#fff;border:1px solid var(--rule);border-radius:var(--r);
             padding:18px 20px;display:flex;align-items:center;gap:14px;
             box-shadow:0 1px 3px rgba(35,116,163,.05);
             transition:box-shadow .15s,transform .15s;cursor:pointer;}
.folder-card:hover{box-shadow:0 3px 12px rgba(35,116,163,.12);transform:translateY(-1px);}
.folder-card .fc-icon{font-size:24px;flex-shrink:0;}
.folder-card .fc-name{font-size:13.5px;font-weight:700;color:var(--b900);}
.folder-card .fc-count{font-size:11.5px;color:var(--muted);margin-top:2px;}

/* status badge */
.status{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;
        border-radius:3px;letter-spacing:.3px;}
.s-done  {background:var(--b100);color:var(--b700);}
.s-wip   {background:var(--b050);color:var(--b500);border:1px solid var(--b100);}
.s-todo  {background:#EEF2F6;color:var(--muted);}

/* divider */
.divider{border:none;border-top:1px solid var(--rule);margin:28px 0;}

footer{background:var(--b900);color:rgba(255,255,255,.38);text-align:center;
       padding:18px;font-size:11px;margin-top:48px;}

@media(max-width:768px){
  .hero{padding:32px 20px;}.container{padding:20px 16px;}
  .dir-grid{grid-template-columns:1fr;}
  nav{padding:0 16px;}
}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/fsl-report/">🏭 FSL 工作台</a>
  <span class="nav-sub">/ SAP 实施</span>
</nav>
<div class="hero">
  <h1>SAP 实施交付物清单</h1>
  <p>SAP S/4HANA PCE · Greenfield · SAP Activate</p>

</div>
<div class="container">
  
  
<div class="bc"><a href="/fsl-report/">工作台</a><span>›</span><span>SAP 实施</span></div>
<div class="cat-header">
  <div class="cat-icon">⚙️</div>
  <div>
    <div class="cat-title">SAP 实施交付物</div>
    <div class="cat-desc">SAP S/4HANA PCE Greenfield 实施，8个月（240天），SAP Activate方法论</div>
  </div>
</div>
<div class="dir-grid">
  <a href="/fsl-report/sap/prepare/" class="folder-card">
  <div class="fc-icon">📁</div>
  <div>

  </div>
</a>
  <a href="/fsl-report/sap/blueprint/" class="folder-card">

  </div>
</a>
  <a href="/fsl-report/sap/realize/" class="folder-card">

  <div>

  </div>
</a>
  <a href="/fsl-report/sap/deploy/" class="folder-card">

  </div>
</a>
</div>

</div>
<footer>佛山照明 SAP S/4HANA 升级项目工作台 · 机密文件 · 仅供项目组内部使用</footer>
</body></html>
