name: Update Document Status

on:
  workflow_dispatch:
    inputs:
      doc_key:
        description: 'Document key'
        required: true
        type: string
      status:
        description: 'Status: todo | wip | done'
        required: true
        type: choice
        options: [todo, wip, done]
      trigger_code:
        description: 'Authorization code'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Verify trigger code
        run: |
          if [ "${{ github.event.inputs.trigger_code }}" != "${{ secrets.TRIGGER_CODE }}" ]; then
            echo "Invalid trigger code"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STATUS_PAT }}

      - name: Update status JSON
        run: |
          python3 - <<'PY'
          import json, os
          f = 'status/doc-status.json'
          key = os.environ['KEY']
          val = os.environ['VAL']
          try:
              with open(f) as fp: data = json.load(fp)
          except: data = {}
          data[key] = val
          with open(f, 'w') as fp: json.dump(data, fp, ensure_ascii=False, indent=2)
          print(f"OK: {key} = {val}")
          PY
        env:
          KEY: ${{ github.event.inputs.doc_key }}
          VAL: ${{ github.event.inputs.status }}

      - name: Commit and push
        run: |
          git config user.name  "FSL Status Bot"
          git config user.email "bot@fsl-report"
          git add status/doc-status.json
          git diff --cached --quiet || git commit -m "status: ${{ github.event.inputs.doc_key }} -> ${{ github.event.inputs.status }}"
          git push
