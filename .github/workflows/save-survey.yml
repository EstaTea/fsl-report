name: Save Survey Response

on:
  repository_dispatch:
    types: [save-survey]

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Write survey data
        env:
          SURVEY_SLUG: ${{ github.event.client_payload.slug }}
          SURVEY_DATA: ${{ toJson(github.event.client_payload.data) }}
        run: |
          FILE="kanban/survey-${SURVEY_SLUG}-data.json"
          mkdir -p kanban
          printf '%s' "$SURVEY_DATA" | python3 -m json.tool --indent 2 > "$FILE"
          echo "Saved to $FILE"

      - name: Commit and push
        run: |
          git config user.name "FSL Survey Bot"
          git config user.email "survey-bot@fsl-report.github.io"
          FILE="kanban/survey-${{ github.event.client_payload.slug }}-data.json"
          git add "$FILE"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "survey: save ${{ github.event.client_payload.slug }} response (${{ github.event.client_payload.date }})"
          git push
